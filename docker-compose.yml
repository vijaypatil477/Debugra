version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      # Provide dummy values for local development if .env is missing
      - GROQ_API_KEY=${GROQ_API_KEY:-dummy_key}
      - CORS_ORIGINS=http://localhost:5173
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: unless-stopped

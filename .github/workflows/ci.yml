
name: CI Pipeline

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run frontend unit tests (Vitest)
        run: npm run test

      - name: Build for production
        run: npm run build

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Syntax Check & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        run: npm install --prefix server

      - name: Verify syntax (node --check on all JS files)
        run: |
          find server -name "*.js" -not -path "*/node_modules/*" -print0 \
            | xargs -0 -n 1 node --check

      - name: Run backend unit tests (Jest)
        run: npm run test --prefix server

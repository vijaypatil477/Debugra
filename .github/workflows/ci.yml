name: CI

on:
  pull_request:

jobs:
  test-and-lint:
    name: Lint + Unit Tests + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test -- --config vitest.unit.config.js


      - name: Build
        run: npm run build

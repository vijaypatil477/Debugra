name: Snyk Security Audit

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-security:
    name: Scan npm dependencies
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        project:
          - name: frontend
            working-directory: .
          - name: backend
            working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Snyk token
        id: snyk-token
        run: |
          if [ -n "$SNYK_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SNYK_TOKEN is not configured. Skipping Snyk scan for this run."
          fi

      - name: Set up Node.js
        if: steps.snyk-token.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project.working-directory }}/package-lock.json

      - name: Install dependencies
        if: steps.snyk-token.outputs.enabled == 'true'
        working-directory: ${{ matrix.project.working-directory }}
        run: npm ci

      - name: Run Snyk test
        if: steps.snyk-token.outputs.enabled == 'true'
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: >-
            --severity-threshold=high
            --file=${{ matrix.project.working-directory }}/package.json
            --package-manager=npm
